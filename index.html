<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <!-- Smart TV On-Screen Error Console for Diagnostics -->
    <div id="tv-error-console" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#121214; color:#ef4444; font-family:monospace; padding:30px; z-index:9999999; overflow:auto; box-sizing:border-box; border:5px solid #ef4444;">
      <h2 style="margin-top:0; color:#ffffff; border-bottom:1px solid #ef4444; padding-bottom:10px; font-size:20px;">⚠️ Erro de Compatibilidade na TV Philips</h2>
      <p style="color:#a1a1aa; font-size:14px; margin-bottom:20px;">O navegador da sua TV encontrou um erro ao iniciar a aplicação. Por favor, tire uma foto desta tela para ajudar no diagnóstico:</p>
      <pre id="tv-error-log" style="white-space:pre-wrap; background:#1a1a1e; padding:15px; border-radius:6px; color:#fca5a5; font-size:12px; line-height:1.6; border:1px solid #3f3f46;"></pre>
      <button onclick="window.location.reload(true)" style="background:#ef4444; color:#ffffff; border:none; padding:10px 20px; font-size:14px; border-radius:4px; cursor:pointer; font-weight:bold; margin-top:15px;">Tentar Recarregar</button>
    </div>
    <script>
      (function() {
        // Polyfill BigInt for older Smart TV browsers (e.g. Philips TV Browser / old Chrome)
        if (typeof window.BigInt === 'undefined') {
          window.BigInt = function(val) {
            if (val === undefined || val === null) {
              throw new TypeError("Cannot convert undefined or null to a BigInt");
            }
            if (typeof val === 'string') {
              val = val.replace(/n$/, '');
              if (val.startsWith('0x') || val.startsWith('0X')) {
                return parseInt(val, 16);
              }
              return parseInt(val, 10);
            }
            var num = Number(val);
            if (isNaN(num)) {
              throw new SyntaxError("Cannot convert " + val + " to a BigInt");
            }
            return Math.floor(num);
          };
          window.BigInt.asIntN = function(bits, val) {
            var num = Number(val);
            var max = Math.pow(2, bits - 1) - 1;
            var min = -Math.pow(2, bits - 1);
            return num > max ? max : (num < min ? min : num);
          };
          window.BigInt.asUintN = function(bits, val) {
            var num = Number(val);
            var max = Math.pow(2, bits) - 1;
            return num > max ? max : (num < 0 ? 0 : num);
          };
          console.log("BigInt has been polyfilled for legacy Smart TV compatibility.");
        }

        // Polyfill AbortController and AbortSignal for older Smart TV browsers
        if (typeof window.AbortController === 'undefined') {
          window.AbortSignal = function() {
            this.aborted = false;
            this._listeners = {};
          };
          window.AbortSignal.prototype.addEventListener = function(type, listener) {
            if (!this._listeners[type]) this._listeners[type] = [];
            this._listeners[type].push(listener);
          };
          window.AbortSignal.prototype.removeEventListener = function(type, listener) {
            if (!this._listeners[type]) return;
            var idx = this._listeners[type].indexOf(listener);
            if (idx !== -1) this._listeners[type].splice(idx, 1);
          };
          window.AbortSignal.prototype.dispatchEvent = function(event) {
            if (!this._listeners[event.type]) return;
            var listeners = this._listeners[event.type].slice();
            for (var i = 0; i < listeners.length; i++) {
              listeners[i].call(this, event);
            }
          };

          window.AbortController = function() {
            this.signal = new window.AbortSignal();
          };
          window.AbortController.prototype.abort = function() {
            if (this.signal.aborted) return;
            this.signal.aborted = true;
            var event;
            try {
              event = new Event('abort');
            } catch (e) {
              event = { type: 'abort', bubbles: false, cancelable: false };
            }
            this.signal.dispatchEvent(event);
            if (typeof this.signal.onabort === 'function') {
              this.signal.onabort(event);
            }
          };
          console.log("AbortController and AbortSignal have been polyfilled for legacy Smart TV compatibility.");
        }

        // Polyfill ResizeObserver (highly required by framer-motion and charts)
        if (typeof window.ResizeObserver === 'undefined') {
          window.ResizeObserver = function(callback) {
            this.observe = function(target) {
              // Minimal mock to avoid crashes
            };
            this.unobserve = function(target) {
              // Minimal mock to avoid crashes
            };
            this.disconnect = function() {
              // Minimal mock to avoid crashes
            };
          };
          console.log("ResizeObserver has been polyfilled for legacy Smart TV compatibility.");
        }

        // Polyfill IntersectionObserver (highly required by lazy images and animation libraries)
        if (typeof window.IntersectionObserver === 'undefined') {
          window.IntersectionObserver = function(callback, options) {
            var self = this;
            this.observe = function(target) {
              // Minimal mock that asynchronously reports intersection to avoid breaking React layout/effects
              if (typeof callback === 'function') {
                setTimeout(function() {
                  try {
                    callback([{
                      target: target,
                      isIntersecting: true,
                      intersectionRatio: 1.0,
                      boundingClientRect: (target && typeof target.getBoundingClientRect === 'function') ? target.getBoundingClientRect() : { top: 0, left: 0, width: 0, height: 0, bottom: 0, right: 0 }
                    }], self);
                  } catch (e) {
                    console.error("IntersectionObserver callback failed:", e);
                  }
                }, 0);
              }
            };
            this.unobserve = function(target) {
              // Minimal mock
            };
            this.disconnect = function() {
              // Minimal mock
            };
          };
          console.log("IntersectionObserver has been polyfilled for legacy Smart TV compatibility.");
        }

        // Polyfill ES6 Array.prototype.flat for old JS engines
        if (!Array.prototype.flat) {
          Array.prototype.flat = function(depth) {
            var d = depth || 1;
            return d > 0 ? this.reduce(function (acc, val) {
              return acc.concat(Array.isArray(val) ? val.flat(d - 1) : val);
            }, []) : this.slice();
          };
          console.log("Array.prototype.flat has been polyfilled.");
        }

        // Polyfill Object.values and Object.entries for old JS engines
        if (!Object.values) {
          Object.values = function(obj) {
            if (obj === undefined || obj === null) {
              throw new TypeError("Cannot convert undefined or null to object");
            }
            return Object.keys(obj).map(function(key) { return obj[key]; });
          };
          console.log("Object.values has been polyfilled.");
        }
        if (!Object.entries) {
          Object.entries = function(obj) {
            if (obj === undefined || obj === null) {
              throw new TypeError("Cannot convert undefined or null to object");
            }
            return Object.keys(obj).map(function(key) { return [key, obj[key]]; });
          };
          console.log("Object.entries has been polyfilled.");
        }

        // Polyfill String.prototype.padStart and padEnd for older JS engines
        if (!String.prototype.padStart) {
          String.prototype.padStart = function(targetLength, padString) {
            var str = String(this);
            padString = padString || ' ';
            while (str.length < targetLength) {
              str = padString + str;
            }
            return str;
          };
          console.log("String.prototype.padStart has been polyfilled.");
        }
        if (!String.prototype.padEnd) {
          String.prototype.padEnd = function(targetLength, padString) {
            var str = String(this);
            padString = padString || ' ';
            while (str.length < targetLength) {
              str = str + padString;
            }
            return str;
          };
          console.log("String.prototype.padEnd has been polyfilled.");
        }

        // Setup error diagnostic display
        var errorLog = [];
        function showError(msg, file, line, col, err) {
          var consoleEl = document.getElementById('tv-error-console');
          var logEl = document.getElementById('tv-error-log');
          if (consoleEl && logEl) {
            consoleEl.style.display = 'block';
            var errorMsg = msg + '\nArquivo: ' + file + '\nLinha: ' + line + (col ? ', Coluna: ' + col : '') + '\n';
            if (err && err.stack) {
              errorMsg += 'Stack: ' + err.stack + '\n';
            }
            errorLog.push(errorMsg);
            logEl.textContent = errorLog.join('\n-------------------\n');
          }
        }
        window.onerror = function(msg, file, line, col, err) {
          showError(msg, file, line, col, err);
          return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = reason instanceof Error ? reason.message : String(reason);
          showError('Unhandled Promise Rejection: ' + msg, 'Promise', 0, 0, reason instanceof Error ? reason : null);
        });
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
